name: Build Samsung Kernel with MidoriSU
on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release Title"
        required: true
        default: "MidoriSU"
      device_model:
        description: "Target Device Model"
        required: true
        default: "SM-G9910"
        type: choice
        options:
          - SM-G9910
          - SM-G9960
          - SM-G9980
          - SM-G990B
          - SM-G990B2
      enable_ksu:
        description: "MidoriSU"
        required: true
        type: boolean
        default: true

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Set up build environment
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            attr ccache clang golang libbrotli-dev \
            libgtest-dev libprotobuf-dev libunwind-dev libusb-1.0-0-dev libzstd-dev \
            linux-modules-extra-$(uname -r) build-essential lld ninja-build protobuf-compiler \
            zipalign gcc-aarch64-linux-gnu zip unzip curl git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
      - name: Fetch AOSP Clang
        run: |
          wget https://github.com/midori01/lahaina_ksu_workflow/raw/refs/heads/main/tools/linux-x86-refs_heads_main-clang-r530567.tar.gz -O aosp-clang.tar.gz
          mkdir -p ${{ github.workspace }}/clang
          tar -xf aosp-clang.tar.gz -C ${{ github.workspace }}/clang
          echo "${{ github.workspace }}/clang/bin" >> $GITHUB_PATH
          echo "CLANG_PATH=${{ github.workspace }}/clang" >> $GITHUB_ENV
          
      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/midori01/android_kernel_samsung_sm8350 kernel_workspace
          
      - name: Build Kernel
        working-directory: kernel_workspace
        run: |
          #!/bin/bash
          
          DEVICE_HARDWARE="sm8350"
          DEVICE_MODEL="${{ github.event.inputs.device_model }}"
          KSU="${{ github.event.inputs.enable_ksu }}"
          
          # Enviorment Variables
          SRC_DIR=$(pwd)
          TC_DIR=${CLANG_PATH:-$(pwd)/clang}
          JOBS="$(nproc --all)"
          MAKE_PARAMS="-j$JOBS -C $SRC_DIR O=$SRC_DIR/out ARCH=arm64 CC=clang CLANG_TRIPLE=$TC_DIR/bin/aarch64-linux-gnu- LLVM=1 CROSS_COMPILE=$TC_DIR/bin/llvm-"
          export PATH="$TC_DIR/bin:$PATH"
          
          if [ "$DEVICE_MODEL" == "SM-G9910" ]; then
              DEVICE_NAME="o1q"
              DEFCONFIG=o1q_defconfig
          elif [ "$DEVICE_MODEL" == "SM-G9960" ]; then
              DEVICE_NAME="t2q"
              DEFCONFIG=t2q_defconfig
          elif [ "$DEVICE_MODEL" == "SM-G9980" ]; then
              DEVICE_NAME="p3q"
              DEFCONFIG=p3q_defconfig
          elif [ "$DEVICE_MODEL" == "SM-G990B" ]; then
              DEVICE_NAME="r9q"
              DEFCONFIG=r9q_defconfig
          elif [ "$DEVICE_MODEL" == "SM-G990B2" ]; then
              DEVICE_NAME="r9q2"
              DEFCONFIG=r9q2_defconfig
          else
              echo "Config not found"
              exit 1
          fi

          if [ "$KSU" == "true" ]; then
              ZIP_NAME="Midori_KSU_${DEVICE_NAME}_${DEVICE_MODEL}_$(date +%d%m%y-%H%M)"
              
              curl -LSs "https://raw.githubusercontent.com/MidoriKSU/KernelSU/main/kernel/setup.sh" -o ksu_setup.sh
              sed -i 's|https://github.com/backslashxx/KernelSU|https://github.com/MidoriKSU/KernelSU|g' ksu_setup.sh
              bash ksu_setup.sh main
              
              if [ -f "KernelSU/kernel/manager/apk_sign.c" ]; then
                  sed -i 's/unsigned char buffer\[0x11\] = { 0 };/return true;\n\tunsigned char buffer[0x11] = { 0 };/g' KernelSU/kernel/manager/apk_sign.c
                  sed -i '/bool is_manager_apk(char \*path)/,$d' KernelSU/kernel/manager/apk_sign.c
                  echo -e 'bool is_manager_apk(char *path)\n{\n\tchar pkg[KSU_MAX_PACKAGE_NAME];\n\tif (get_pkg_from_apk_path(pkg, path) < 0) {\n\t\treturn false;\n\t}\n\treturn strcmp(pkg, "com.midori.supermanager") == 0;\n}' >> KernelSU/kernel/manager/apk_sign.c
              fi

              git clone --bare https://github.com/midori01/KernelSU.git /tmp/midori01_ksu
              COMMIT_COUNT=$(git -C /tmp/midori01_ksu rev-list --count HEAD)
              rm -rf /tmp/midori01_ksu
              NEW_KSU_VERSION=$((30000 + COMMIT_COUNT))
              echo "[+] Dynamic KSU_VERSION calculated: $NEW_KSU_VERSION"
              if [ -f "KernelSU/kernel/Makefile" ]; then
                  sed -i "s/-DKSU_VERSION=[0-9]*/-DKSU_VERSION=$NEW_KSU_VERSION/g" KernelSU/kernel/Makefile
              fi
          
              echo "CONFIG_KSU=y"                                >> arch/arm64/configs/$DEFCONFIG
              echo "# CONFIG_KSU_LSM_SECURITY_HOOKS is not set"  >> arch/arm64/configs/$DEFCONFIG
              echo "CONFIG_KSU_EXTRAS=y"                         >> arch/arm64/configs/$DEFCONFIG
              echo "CONFIG_KSU_THRONE_TRACKER_ALWAYS_THREADED=y" >> arch/arm64/configs/$DEFCONFIG
              sed -i 's/CONFIG_KPROBES=y/# CONFIG_KPROBES is not set/' arch/arm64/configs/$DEFCONFIG
          
              PATCH_BASE="https://raw.githubusercontent.com/yapixel/kernel_patches/dev/midorisu"
              echo "Applying xxKSU manual hook patches..."
          
              curl -sSL "$PATCH_BASE/manual-security-hooks-v1.8.patch" -o /tmp/manual-security-hooks-v1.8.patch
              patch -p1 -d "$SRC_DIR" --fuzz=3 --ignore-whitespace < /tmp/manual-security-hooks-v1.8.patch || {
                  echo "ERROR: manual-security-hooks-v1.8.patch failed, aborting!" >&2
                  exit 1
              }
              echo "Applied: manual-security-hooks-v1.8.patch"
          
              curl -sSL "$PATCH_BASE/scope-min-manual-hooks-v1.9.patch" -o /tmp/scope-min-manual-hooks-v1.9.patch
              patch -p1 -d "$SRC_DIR" --fuzz=3 --ignore-whitespace < /tmp/scope-min-manual-hooks-v1.9.patch || {
                  echo "ERROR: scope-min-manual-hooks-v1.9.patch failed, aborting!" >&2
                  exit 1
              }
              echo "Applied: scope-min-manual-hooks-v1.9.patch"
          
          else
              echo "KSU disabled"
              ZIP_NAME="Midori_${DEVICE_NAME}_${DEVICE_MODEL}_$(date +%d%m%y-%H%M)"
          fi

          cat <<EOF >> arch/arm64/configs/$DEFCONFIG
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_IP_SET=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          EOF

          make $MAKE_PARAMS $DEFCONFIG
          make $MAKE_PARAMS
          make $MAKE_PARAMS INSTALL_MOD_PATH=modules INSTALL_MOD_STRIP=1 modules_install

          # AnyKernel3 Packaging
          git clone https://github.com/midori01/AnyKernel3 -b samsung AnyKernel3
          mkdir -p AnyKernel3/modules/vendor/lib/modules/
          
          find "$(pwd)/out/modules" -type f -iname "*.ko" -exec cp -r {} ./AnyKernel3/modules/vendor/lib/modules/ \;
          cp ./out/arch/arm64/boot/Image ./AnyKernel3/
          cp ./out/arch/arm64/boot/dtbo.img ./AnyKernel3/
          
          cd AnyKernel3
          rm -rf Midori*
          zip -r9 $ZIP_NAME.zip . -x '*.git*' '*patch*' '*ramdisk*' 'LICENSE' 'README.md'
          mv $ZIP_NAME.zip ../
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.device_model }}-Kernel
          path: kernel_workspace/*.zip

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: kernel_workspace/*.zip
          name: ${{ github.event.inputs.release_name }} - ${{ github.event.inputs.device_model }}
          tag_name: CI_${{ github.run_id }}
          body: |
            Device: ${{ github.event.inputs.device_model }}
            Variant: MidoriSU (xxKSU driver + KowSU manager)
            Compiler: AOSP clang-r530567
            Source: midori01/android_kernel_samsung_sm8350
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
