name: Build SM-G9910 xxKSU Kernel
on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release Title"
        required: true
        default: "SM-G9910 xxKSU Kernel"
jobs:
  build_lavender:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up build environment
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            attr ccache clang golang libbrotli-dev \
            libgtest-dev libprotobuf-dev libunwind-dev libusb-1.0-0-dev libzstd-dev \
            linux-modules-extra-$(uname -r) build-essential lld ninja-build protobuf-compiler \
            zipalign gcc-aarch64-linux-gnu zip unzip curl git
          
      - name: Fetch AOSP Clang
        run: |
          wget https://github.com/midori01/lahaina_ksu_workflow/raw/refs/heads/main/tools/linux-x86-refs_heads_main-clang-r530567.tar.gz -O aosp-clang.tar.gz
          mkdir -p ${{ github.workspace }}/clang
          tar -xf aosp-clang.tar.gz -C ${{ github.workspace }}/clang
          echo "${{ github.workspace }}/clang/bin" >> $GITHUB_PATH
          echo "CLANG_PATH=${{ github.workspace }}/clang" >> $GITHUB_ENV
          
      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/midori01/SM-G9910_Kernel kernel_workspace

      - name: Build Kernel With xxKSU
        run: |
          cp ./build_release_script.sh kernel_workspace/
          cd kernel_workspace
          chmod +x build_release_script.sh
          ./build_release_script.sh SM-G9910 --ksu

      - name: Check and Move Artifacts
        run: |
          ls -l kernel_workspace/*.zip
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SM-G9910-xxKSU-Kernel
          path: kernel_workspace/Midori*.zip

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: kernel_workspace/Lavender*.zip
          name: ${{ github.event.inputs.release_name }}
          tag_name: CI_${{ github.run_id }}
          body: |
            Device: SM-G9910 (Snapdragon)
            Variant: xxKSU (Hookless)
            Compiler: AOSP clang-r530567
            Source: midori01/SM-G9910_Kernel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
