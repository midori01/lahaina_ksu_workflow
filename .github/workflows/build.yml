name: Build SM-G9910 xxKSU Kernel

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release Title"
        required: true
        default: "SM-G9910 xxKSU Build"

jobs:
  build_lavender:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Set up build environment
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            attr ccache clang golang libbrotli-dev \
            libgtest-dev libprotobuf-dev libunwind-dev libusb-1.0-0-dev libzstd-dev \
            linux-modules-extra-$(uname -r) build-essential lld ninja-build protobuf-compiler \
            zipalign gcc-aarch64-linux-gnu zip unzip curl git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
      - name: Fetch AOSP Clang
        run: |
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz -O aosp-clang.tar.gz
          mkdir clang && tar -xf aosp-clang.tar.gz -C clang && rm -rf aosp-clang.tar.gz
          
      - name: Clone Kernel Source
        run: |
          # Swapped to your new LucasBlackLu repository
          git clone --depth=1 https://github.com/LucasBlackLu/android_kernel_samsung_sm8350 kernel_workspace
          
      - name: Build Kernel With xxKSU
        run: |
          # Make the script executable
          chmod +x ./build_script.sh
          # Move the script into the kernel source directory
          cp ./build_script.sh kernel_workspace/
          # Enter the directory and run the build
          cd kernel_workspace
          ./build_script.sh SM-G9910 --ksu
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SM-G9910-xxKSU-Kernel
          path: kernel_workspace/Lavender*.zip

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: kernel_workspace/Lavender*.zip
          name: ${{ github.event.inputs.release_name }}
          tag_name: CI_${{ github.run_id }}
          body: |
            Device: SM-G9910 (Snapdragon)
            Variant: xxKSU
            Compiler: AOSP clang-r530567
            Source: LucasBlackLu/android_kernel_samsung_sm8350
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
